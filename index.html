<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive 3D Earth Explorer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="ui-panel">
    <h1>3D Earth Explorer</h1>
    <p>Drag to orbit · Scroll to zoom</p>
    <label><input id="toggleClouds" type="checkbox" checked /> Clouds</label>
    <label><input id="toggleAtmosphere" type="checkbox" checked /> Atmosphere</label>
    <label><input id="toggleNight" type="checkbox" checked /> Night lights</label>
  </div>

  <div id="loading">Loading Earth assets…</div>

  <script type="module" src="main.js"></script>
</body>
</html>
